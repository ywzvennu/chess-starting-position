[package]
name = "chess-starting-position"
version = "0.1.0"
edition = "2021"
description = "Web UI for the chess-startpos-rs library"
license = "MIT"
repository = "https://github.com/ywzvennu/chess-starting-position"

[dependencies]
leptos = { version = "0.8", features = ["csr"] }
console_error_panic_hook = "0.1"
chess-startpos-rs = { version = "0.1", features = ["serde"] }
web-sys = { version = "0.3", features = ["Window", "Storage", "Document", "Element", "Navigator", "Clipboard"] }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
