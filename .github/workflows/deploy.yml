name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    # SemVer-style release tags. Glob is `v[0-9]*.[0-9]*.[0-9]*` (minimatch,
    # not regex), so `v1.2.3` matches and `vlatest`/`v-experimental` do not.
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute build metadata
        run: |
          echo "BUILD_VERSION=$(git describe --tags --always --dirty)" >> "$GITHUB_ENV"
          echo "BUILD_SHA=$(git rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and target
        uses: Swatinem/rust-cache@v2

      - name: Install Trunk
        uses: jetli/trunk-action@v0.5.0
        with:
          version: latest

      - name: Build site
        run: trunk build --release --public-url "/chess-starting-position/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    # Only publish to Pages on SemVer tag pushes or a manual run. Pushes to
    # `main` still run the `build` job above for validation, but do not
    # deploy until a tag is cut.
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
